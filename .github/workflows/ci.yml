name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        env:
          # Minimal env vars required for build
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: SaaS Starter
          DATABASE_URL: postgresql://saas:saas@localhost:5432/saas
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci-secret-at-least-32-characters-long
          EMAIL_PROVIDER: smtp
          EMAIL_FROM: noreply@example.com
          BILLING_PROVIDER: stripe
        run: npm run build

  docker-compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate compose.yml
        run: docker compose -f compose.yml config --quiet

      - name: Validate compose.dev.yml
        run: docker compose -f compose.yml -f compose.dev.yml config --quiet
